<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>버리고 — 오늘의 무거운 마음을 버리는 곳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#1a1528; --night2:#221a35; --card:rgba(54,42,78,0.45); --card-line:rgba(180,150,210,0.16);
    --text:#e9e2f0; --text-mute:#a89bc0; --text-faint:#6f6488;
    --apricot:#e9a87c; --apricot-soft:#f3c9a8; --gold:#e8c468; --lilac:#c8a8e0;
    --glow:rgba(233,168,124,0.32);
    --serif:'Gowun Batang',serif; --sans:'IBM Plex Sans KR',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{background:var(--night);color:var(--text);font-family:var(--sans);font-weight:300;line-height:1.8;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative;min-height:100vh;
    background-image:radial-gradient(ellipse 70% 45% at 50% 0%, rgba(200,168,224,0.13), transparent 60%),radial-gradient(ellipse 60% 40% at 80% 25%, rgba(233,168,124,0.09), transparent 55%);}
  ::selection{background:var(--apricot);color:var(--night);}

  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .star{position:absolute;border-radius:50%;background:var(--apricot-soft);opacity:0;animation:drift linear infinite;}
  @keyframes drift{0%{transform:translateY(20px) scale(.6);opacity:0;}15%{opacity:.6;}85%{opacity:.4;}100%{transform:translateY(-80px) scale(1);opacity:0;}}

  .wrap{max-width:600px;margin:0 auto;padding:0 22px;position:relative;z-index:1;}

  /* header */
  header{text-align:center;padding:54px 22px 10px;position:relative;z-index:1;}
  .brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:20px;}
  .brand .dot{width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--apricot-soft),var(--apricot));box-shadow:0 0 14px var(--glow);}
  .brand .ko{font-family:var(--serif);font-weight:700;font-size:1.2rem;letter-spacing:.04em;}
  header h1{font-family:var(--serif);font-weight:700;font-size:clamp(1.6rem,5vw,2.2rem);line-height:1.45;}
  header h1 .fade{background:linear-gradient(100deg,var(--apricot),var(--gold),var(--lilac));-webkit-background-clip:text;background-clip:text;color:transparent;}
  header p{color:var(--text-mute);font-size:.96rem;margin-top:14px;}

  /* composer */
  .composer{margin:30px auto 0;max-width:560px;background:var(--card);border:1px solid var(--card-line);border-radius:22px;padding:22px;backdrop-filter:blur(8px);position:relative;}
  .composer textarea{width:100%;background:transparent;border:none;outline:none;resize:none;color:var(--text);
    font-family:var(--serif);font-size:1.12rem;line-height:1.7;min-height:84px;}
  .composer textarea::placeholder{color:var(--text-faint);}
  .composer .bar{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:12px;flex-wrap:wrap;}
  .cats{display:flex;gap:7px;flex-wrap:wrap;}
  .cat{font-family:var(--sans);font-size:.82rem;font-weight:300;color:var(--text-mute);background:transparent;
    border:1px solid var(--card-line);padding:6px 13px;border-radius:30px;cursor:pointer;transition:all .2s;}
  .cat:hover{border-color:rgba(233,168,124,0.4);}
  .cat.on{background:rgba(233,168,124,0.16);border-color:rgba(233,168,124,0.55);color:var(--apricot-soft);}
  .toss{display:flex;align-items:center;gap:10px;}
  .vis{font-family:var(--sans);font-size:.8rem;color:var(--text-faint);background:transparent;border:1px solid var(--card-line);
    padding:8px 12px;border-radius:24px;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .vis:hover{border-color:rgba(200,168,224,0.4);color:var(--text-mute);}
  .vis.public{border-color:rgba(200,168,224,0.5);color:var(--lilac);}
  .toss-btn{font-family:var(--sans);font-size:.96rem;font-weight:400;color:var(--night);border:none;cursor:pointer;
    padding:11px 26px;border-radius:28px;background:linear-gradient(110deg,var(--apricot-soft),var(--apricot));
    box-shadow:0 6px 22px var(--glow);transition:transform .15s,opacity .3s;}
  .toss-btn:active{transform:scale(.96);}
  .toss-btn:disabled{opacity:.5;cursor:default;}

  /* trash can mini (in composer toss) */
  .afterglow{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px;background:radial-gradient(ellipse at 50% 45%,rgba(45,33,66,0.7),rgba(26,21,40,0.96));
    backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .7s ease;}
  .afterglow.show{opacity:1;pointer-events:auto;}
  .afterglow .ring{width:60px;height:60px;border-radius:50%;border:1.5px solid var(--apricot);margin-bottom:26px;position:relative;}
  .afterglow.show .ring::after,.afterglow.show .ring::before{content:'';position:absolute;inset:-1.5px;border-radius:50%;border:1.5px solid var(--apricot-soft);animation:ripple 2.6s ease-out infinite;}
  .afterglow.show .ring::before{animation-delay:1.3s;}
  @keyframes ripple{0%{transform:scale(1);opacity:.8;}100%{transform:scale(2.7);opacity:0;}}
  .afterglow .msg{font-family:var(--serif);font-weight:700;font-size:1.5rem;line-height:1.6;margin-bottom:12px;}
  .afterglow .sub{font-family:var(--serif);font-size:1rem;color:var(--apricot-soft);}
  .afterglow .tap{margin-top:30px;font-size:.84rem;color:var(--text-faint);}

  /* feed */
  .feed-head{margin:54px auto 18px;max-width:560px;display:flex;align-items:baseline;justify-content:space-between;}
  .feed-head h2{font-family:var(--serif);font-weight:700;font-size:1.25rem;}
  .feed-head .note{font-size:.82rem;color:var(--text-faint);}
  .filters{max-width:560px;margin:0 auto 16px;display:flex;gap:7px;flex-wrap:wrap;}
  .filt{font-family:var(--sans);font-size:.82rem;color:var(--text-mute);background:transparent;border:1px solid var(--card-line);
    padding:6px 14px;border-radius:30px;cursor:pointer;transition:all .2s;}
  .filt.on{background:rgba(200,168,224,0.14);border-color:rgba(200,168,224,0.45);color:var(--lilac);}

  .feed{max-width:560px;margin:0 auto;padding-bottom:70px;display:flex;flex-direction:column;gap:12px;}
  .item{background:var(--card);border:1px solid var(--card-line);border-radius:16px;padding:16px 18px;backdrop-filter:blur(6px);
    animation:rise .6s cubic-bezier(.2,.7,.3,1) both;}
  @keyframes rise{0%{opacity:0;transform:translateY(16px);}100%{opacity:1;transform:none;}}
  .item .txt{font-family:var(--serif);font-size:1.04rem;color:var(--text);line-height:1.65;}
  .item .meta{display:flex;align-items:center;gap:10px;margin-top:11px;}
  .tag{font-family:var(--sans);font-size:.74rem;padding:3px 11px;border-radius:20px;letter-spacing:.02em;}
  .tag.emo{background:rgba(200,168,224,0.16);color:var(--lilac);}
  .tag.work{background:rgba(233,168,124,0.16);color:var(--apricot-soft);}
  .tag.need{background:rgba(232,196,104,0.16);color:var(--gold);}
  .item .ago{font-size:.74rem;color:var(--text-faint);}
  .item .me{font-size:.74rem;color:var(--apricot-soft);margin-left:auto;}
  .empathy{margin-left:auto;font-family:var(--sans);font-size:.78rem;color:var(--text-faint);background:transparent;border:none;cursor:pointer;transition:color .2s;display:flex;align-items:center;gap:5px;}
  .empathy:hover{color:var(--apricot-soft);}
  .empathy.on{color:var(--apricot);}

  footer{text-align:center;padding:30px 22px 50px;color:var(--text-faint);font-size:.8rem;border-top:1px solid var(--card-line);}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<header>
  <div class="brand"><span class="dot"></span><span class="ko">버리고</span></div>
  <h1>오늘 무거웠던 마음,<br><span class="fade">여기 버리고</span> 가세요.</h1>
  <p>고민도, 불안도, 불편함도. 적어서 버리면 가벼워져요.</p>
</header>

<!-- composer -->
<div class="wrap">
  <div class="composer">
    <textarea id="input" placeholder="무엇이 마음에 걸리나요? 떠오르는 대로 적어보세요." maxlength="400"></textarea>
    <div class="bar">
      <div class="cats" id="cats">
        <button class="cat" data-c="emo">감정·기분</button>
        <button class="cat" data-c="work">일·고민</button>
        <button class="cat" data-c="need">불편·아쉬움</button>
      </div>
    </div>
    <div class="bar" style="margin-top:14px;">
      <button class="vis" id="visBtn">🔒 그냥 조용히 버리기</button>
      <div class="toss"><button class="toss-btn" id="tossBtn">버리기</button></div>
    </div>
  </div>
</div>

<!-- feed -->
<div class="feed-head wrap">
  <h2>사람들이 버린 마음</h2>
  <span class="note">공개로 버린 것만 익명으로 보여요</span>
</div>
<div class="filters wrap" id="filters">
  <button class="filt on" data-f="all">전체</button>
  <button class="filt" data-f="emo">감정·기분</button>
  <button class="filt" data-f="work">일·고민</button>
  <button class="filt" data-f="need">불편·아쉬움</button>
</div>
<div class="feed" id="feed"></div>

<!-- afterglow overlay -->
<div class="afterglow" id="afterglow">
  <div class="ring"></div>
  <p class="msg" id="afterMsg">잘 버렸어요.</p>
  <p class="sub" id="afterSub">조금 가벼워지셨길 바라요.</p>
  <p class="tap">화면을 누르면 닫혀요</p>
</div>

<footer>버리고 · 담아두지 말고 버리고 가세요</footer>

<script>
  // particles
  const stars=document.getElementById('stars');
  for(let i=0;i<30;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*3+1.5;
    s.style.width=sz+'px';s.style.height=sz+'px';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.animationDuration=(Math.random()*8+7)+'s';s.style.animationDelay=(Math.random()*8)+'s';stars.appendChild(s);}

  // seed feed (sample anonymous tosses)
  const CAT={emo:'감정·기분',work:'일·고민',need:'불편·아쉬움'};
  let feedData=[
    {txt:"회의에서 한 말이 자꾸 마음에 걸린다. 괜히 그렇게 말했나 싶어서 계속 곱씹게 돼.",c:"work",ago:"방금"},
    {txt:"AI한테 뭘 시키고 싶은데 프롬프트를 어떻게 써야 할지 모르겠어. 매번 원하는 답이 안 나와.",c:"need",ago:"3분 전"},
    {txt:"다들 앞으로 나아가는 것 같은데 나만 제자리인 것 같아서 불안해.",c:"emo",ago:"11분 전"},
    {txt:"앱마다 회원가입이 너무 귀찮다. 그냥 한 번에 되면 좋겠는데.",c:"need",ago:"24분 전"},
    {txt:"친구한테 서운한 게 있는데 말하자니 옹졸해 보일까 봐 그냥 삼켰어.",c:"emo",ago:"38분 전"},
    {txt:"할 일은 많은데 뭐부터 해야 할지 모르겠어서 결국 아무것도 못 했다.",c:"work",ago:"1시간 전"},
  ];

  const messages=["잘 버렸어요.","오늘은 여기까지만.","내려놓아 줘서 고마워요.","그 마음, 잘 보냈어요.","가벼워져도 괜찮아요.","수고했어요, 오늘도."];
  let lastMsg=-1;

  // category select (composer)
  let selCat=null;
  document.getElementById('cats').addEventListener('click',e=>{
    const b=e.target.closest('.cat'); if(!b) return;
    if(b.classList.contains('on')){b.classList.remove('on');selCat=null;}
    else{document.querySelectorAll('.cat').forEach(x=>x.classList.remove('on'));b.classList.add('on');selCat=b.dataset.c;}
  });

  // visibility toggle
  let isPublic=false;
  const visBtn=document.getElementById('visBtn');
  visBtn.addEventListener('click',()=>{
    isPublic=!isPublic;
    if(isPublic){visBtn.classList.add('public');visBtn.textContent="🌙 공개로 버리기 (익명)";}
    else{visBtn.classList.remove('public');visBtn.textContent="🔒 그냥 조용히 버리기";}
  });

  // filter
  let filter='all';
  document.getElementById('filters').addEventListener('click',e=>{
    const b=e.target.closest('.filt'); if(!b) return;
    document.querySelectorAll('.filt').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); filter=b.dataset.f; renderFeed();
  });

  function renderFeed(){
    const feed=document.getElementById('feed'); feed.innerHTML='';
    feedData.filter(d=>filter==='all'||d.c===filter).forEach((d,i)=>{
      const el=document.createElement('div'); el.className='item'; el.style.animationDelay=(i*0.04)+'s';
      el.innerHTML=`<p class="txt">${escapeHtml(d.txt)}</p>
        <div class="meta">
          <span class="tag ${d.c}">${CAT[d.c]}</span>
          <span class="ago">${d.ago}</span>
          ${d.me?'<span class="me">내가 버린 것</span>':''}
          <button class="empathy" data-i="${i}">🤍 나도 그래요 <span>${d.emp||0}</span></button>
        </div>`;
      feed.appendChild(el);
    });
  }
  function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  // empathy click
  document.getElementById('feed').addEventListener('click',e=>{
    const b=e.target.closest('.empathy'); if(!b) return;
    const i=+b.dataset.i; const visible=feedData.filter(d=>filter==='all'||d.c===filter);
    const item=visible[i]; if(item._emp){return;} item._emp=true; item.emp=(item.emp||0)+1;
    b.classList.add('on'); b.querySelector('span').textContent=item.emp;
  });

  // toss flow
  const input=document.getElementById('input'), tossBtn=document.getElementById('tossBtn');
  const afterglow=document.getElementById('afterglow'), afterMsg=document.getElementById('afterMsg'), afterSub=document.getElementById('afterSub');
  function toss(){
    const text=input.value.trim(); if(!text){input.focus();return;}
    // add to feed only if public
    if(isPublic){
      feedData.unshift({txt:text,c:selCat||'emo',ago:'방금',me:true,emp:0});
    }
    // afterglow
    let n;do{n=Math.floor(Math.random()*messages.length);}while(n===lastMsg);lastMsg=n;
    afterMsg.textContent=messages[n];
    afterSub.textContent=isPublic?"누군가 당신의 마음에 공감할 거예요.":"조금 가벼워지셨길 바라요.";
    afterglow.classList.add('show');
    // reset composer
    input.value=''; selCat=null; document.querySelectorAll('.cat').forEach(x=>x.classList.remove('on'));
    renderFeed();
  }
  tossBtn.addEventListener('click',toss);
  afterglow.addEventListener('click',()=>afterglow.classList.remove('show'));

  renderFeed();
</script>
</body>
</html>
